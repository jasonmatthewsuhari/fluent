name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want Fluent to support.
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility impact
      description: Who benefits from this, and how?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there simpler or safer ways to solve the same problem?
    validations:
      required: false
