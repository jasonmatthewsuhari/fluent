version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      frontend-tooling:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "typescript"
          - "eslint*"
          - "prettier"
          - "typescript-eslint"
          - "markdownlint-cli2"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      electron:
        patterns:
          - "electron"
          - "electron-builder"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
